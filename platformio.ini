; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcu-32s

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
; Auto-detect CP210x in scripts/esp32_boot.py (avoids Bluetooth earbuds).
; Override manually if needed: pio run -t upload --upload-port /dev/cu.SLAB_USBtoUART
upload_speed = 115200
upload_flags =
	--before=no-reset
	--connect-attempts=10
build_flags = -DDEBUG_MODE=0
; extra_scripts = pre:scripts/esp32_boot.py
; Exclude the standalone ECU-simulator app from the main firmware build.
build_src_filter = +<*> -<ecu_sim/>
lib_deps =
	coryjfowler/mcp_can@^1.5.0
	esp32async/ESPAsyncWebServer@^3.7.10
	esp32async/AsyncTCP@^3.4.5
	mikalhart/TinyGPSPlus@^1.1.0

; Bench ECU simulator: flash to a SECOND ESP32 + MCP2515 wired CANH/CANL to the
; main board. Replays a recorded capture so the dashboard runs without a car.
; Build/upload: pio run -e esp32-ecu-sim -t upload
[env:esp32-ecu-sim]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_src_filter = +<ecu_sim/>
lib_deps =
	coryjfowler/mcp_can@^1.5.0

; Legacy Arduino Uno + MCP2515 CAN shield target
[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
build_src_filter = +<*> -<ecu_sim/>
lib_deps =
	coryjfowler/mcp_can@^1.5.0
	sandeepmistry/CAN@^0.3.1
